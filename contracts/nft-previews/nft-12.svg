<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#EF4444" flood-opacity="0.7"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="24"/>

  <!-- Background pattern -->
  
        <polygon points="256,40 310,70 310,130 256,160 202,130 202,70" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.15"/>
        <polygon points="256,160 310,190 310,250 256,280 202,250 202,190" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.15"/>
        <polygon points="256,280 310,310 310,370 256,400 202,370 202,310" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.15"/>
        <polygon points="130,100 184,130 184,190 130,220 76,190 76,130" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.1"/>
        <polygon points="382,100 436,130 436,190 382,220 328,190 328,130" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.1"/>
      

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="190" fill="url(#glow)"/>

  <!-- Frame -->
  
        <polygon points="256,70 396,150 396,310 256,390 116,310 116,150"
          fill="none" stroke="url(#badge-grad)" stroke-width="3.75" opacity="0.7"/>
        <polygon points="256,90 376,163 376,297 256,370 136,297 136,163"
          fill="none" stroke="url(#badge-grad)" stroke-width="2.5" opacity="0.4"/>
      

  <!-- Inner fill subtle -->
  <circle cx="256" cy="220" r="120" fill="#EF4444" opacity="0.05"/>

  <!-- TRIVQ Token Symbol — toujours présent et central -->
  
    <!-- TRIVQ Token Symbol -->
    <circle cx="256" cy="185" r="80" fill="url(#badge-grad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="256" cy="185" r="76" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="256" y="197" text-anchor="middle" 
      font-size="44" font-weight="900" font-family="Arial Black, sans-serif"
      fill="rgba(10,11,15,0.9)">Q</text>
    <text x="256" y="165" text-anchor="middle"
      font-size="17.6" font-weight="bold" font-family="Arial, sans-serif"
      fill="rgba(10,11,15,0.7)">$TRIVQ</text>
  

  <!-- Category emoji -->
  <text x="256" y="305" text-anchor="middle" font-size="32"
    font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🌍</text>

  <!-- NFT Name -->
  <text x="256" y="345" text-anchor="middle" font-size="20" font-weight="900"
    font-family="Arial Black, sans-serif" fill="#EF4444"
    filter="url(#shadow)">Africa Explorer #012</text>

  <!-- Category -->
  <text x="256" y="368" text-anchor="middle" font-size="12"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.45)">Géographie Africaine</text>

  <!-- Rarity badge -->
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="#EF4444" opacity="0.15"/>
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="none" stroke="#EF4444" stroke-width="1" opacity="0.4"/>
  <text x="256" y="397" text-anchor="middle" font-size="11" font-weight="bold"
    font-family="Arial, sans-serif" fill="#EF4444">⬡ RARE</text>

  <!-- Edition -->
  <text x="256" y="430" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.25)">#012 / 150</text>

  <!-- TriviaQ watermark -->
  <text x="256" y="455" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.15)">TriviaQ · Celo Network</text>

  <!-- Decorative stars -->
  <text x="40" y="50" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="472" y="50" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="40" y="472" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="472" y="472" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="256" y="30" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="256" y="490" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
<text x="30" y="256" text-anchor="middle" font-size="12" fill="#EF4444" opacity="0.4">✦</text>
</svg>