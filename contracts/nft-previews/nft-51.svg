<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a1510"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#35D07F" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#35D07F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35D07F"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#35D07F"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#35D07F" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="24"/>

  <!-- Background pattern -->
  
        <line x1="0" y1="128" x2="512" y2="128" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <line x1="0" y1="256" x2="512" y2="256" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <line x1="0" y1="384" x2="512" y2="384" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <line x1="128" y1="0" x2="128" y2="512" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <line x1="256" y1="0" x2="256" y2="512" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <line x1="384" y1="0" x2="384" y2="512" stroke="#35D07F" stroke-width="0.5" opacity="0.15"/>
        <circle cx="128" cy="128" r="4" fill="#35D07F" opacity="0.3"/>
        <circle cx="384" cy="128" r="4" fill="#35D07F" opacity="0.3"/>
        <circle cx="128" cy="384" r="4" fill="#35D07F" opacity="0.3"/>
        <circle cx="384" cy="384" r="4" fill="#35D07F" opacity="0.3"/>
        <circle cx="256" cy="128" r="3" fill="#35D07F" opacity="0.2"/>
        <circle cx="256" cy="384" r="3" fill="#35D07F" opacity="0.2"/>
      

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="190" fill="url(#glow)"/>

  <!-- Frame -->
  
        <polygon points="166,76 346,76 436,166 436,346 346,436 166,436 76,346 76,166"
          fill="none" stroke="url(#badge-grad)" stroke-width="1.5" opacity="0.7"/>
        <polygon points="176,96 336,96 416,176 416,336 336,416 176,416 96,336 96,176"
          fill="none" stroke="url(#badge-grad)" stroke-width="1" opacity="0.4"/>
      

  <!-- Inner fill subtle -->
  <circle cx="256" cy="220" r="120" fill="#35D07F" opacity="0.05"/>

  <!-- TRIVQ Token Symbol — toujours présent et central -->
  
    <!-- TRIVQ Token Symbol -->
    <circle cx="256" cy="185" r="80" fill="url(#badge-grad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="256" cy="185" r="76" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="256" y="197" text-anchor="middle" 
      font-size="44" font-weight="900" font-family="Arial Black, sans-serif"
      fill="rgba(10,11,15,0.9)">Q</text>
    <text x="256" y="165" text-anchor="middle"
      font-size="17.6" font-weight="bold" font-family="Arial, sans-serif"
      fill="rgba(10,11,15,0.7)">$TRIVQ</text>
  

  <!-- Category emoji -->
  <text x="256" y="305" text-anchor="middle" font-size="32"
    font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">📜</text>

  <!-- NFT Name -->
  <text x="256" y="345" text-anchor="middle" font-size="20" font-weight="900"
    font-family="Arial Black, sans-serif" fill="#35D07F"
    filter="url(#shadow)">Culture Keeper #051</text>

  <!-- Category -->
  <text x="256" y="368" text-anchor="middle" font-size="12"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.45)">Histoire & Culture</text>

  <!-- Rarity badge -->
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="#35D07F" opacity="0.15"/>
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="none" stroke="#35D07F" stroke-width="1" opacity="0.4"/>
  <text x="256" y="397" text-anchor="middle" font-size="11" font-weight="bold"
    font-family="Arial, sans-serif" fill="#35D07F">⬡ COMMON</text>

  <!-- Edition -->
  <text x="256" y="430" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.25)">#051 / 150</text>

  <!-- TriviaQ watermark -->
  <text x="256" y="455" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.15)">TriviaQ · Celo Network</text>

  <!-- Decorative stars -->
  <text x="40" y="50" text-anchor="middle" font-size="12" fill="#35D07F" opacity="0.4">✦</text>
<text x="472" y="50" text-anchor="middle" font-size="12" fill="#35D07F" opacity="0.4">✦</text>
<text x="40" y="472" text-anchor="middle" font-size="12" fill="#35D07F" opacity="0.4">✦</text>
</svg>