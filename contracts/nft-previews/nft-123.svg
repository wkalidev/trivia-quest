<text x="256" y="490" text-anchor="middle" font-size="12" fill="#8B5CF6" opacity="0.4">✦</text>
<text x="30" y="256" text-anchor="middle" font-size="12" fill="#8B5CF6" opacity="0.4">✦</text>
<text x="490" y="256" text-anchor="middle" font-size="12" fill="#8B5CF6" opacity="0.4">✦</text>
<text x="100" y="100" text-anchor="middle" font-size="12" fill="#8B5CF6" opacity="0.4">✦</text>
<text x="412" y="100" text-anchor="middle" font-size="12" fill="#8B5CF6" opacity="0.4">✦</text>
