<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a15"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#EC4899" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="24"/>

  <!-- Background pattern -->
  
        <rect x="236" y="20" width="40" height="40" transform="rotate(45 256 40)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
        <rect x="56" y="140" width="40" height="40" transform="rotate(45 76 160)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
        <rect x="416" y="140" width="40" height="40" transform="rotate(45 436 160)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
        <rect x="56" y="320" width="40" height="40" transform="rotate(45 76 340)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
        <rect x="416" y="320" width="40" height="40" transform="rotate(45 436 340)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
        <rect x="236" y="440" width="40" height="40" transform="rotate(45 256 460)" fill="none" stroke="#EC4899" stroke-width="0.5" opacity="0.12"/>
      

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="190" fill="url(#glow)"/>

  <!-- Frame -->
  
        <path d="M256,60 L390,120 L390,280 Q390,370 256,410 Q122,370 122,280 L122,120 Z"
          fill="none" stroke="url(#badge-grad)" stroke-width="3" opacity="0.7"/>
        <path d="M256,80 L375,135 L375,278 Q375,358 256,395 Q137,358 137,278 L137,135 Z"
          fill="none" stroke="url(#badge-grad)" stroke-width="2" opacity="0.4"/>
      

  <!-- Inner fill subtle -->
  <circle cx="256" cy="220" r="120" fill="#EC4899" opacity="0.05"/>

  <!-- TRIVQ Token Symbol — toujours présent et central -->
  
    <!-- TRIVQ Token Symbol -->
    <circle cx="256" cy="185" r="80" fill="url(#badge-grad)" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="256" cy="185" r="76" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="256" y="197" text-anchor="middle" 
      font-size="44" font-weight="900" font-family="Arial Black, sans-serif"
      fill="rgba(10,11,15,0.9)">Q</text>
    <text x="256" y="165" text-anchor="middle"
      font-size="17.6" font-weight="bold" font-family="Arial, sans-serif"
      fill="rgba(10,11,15,0.7)">$TRIVQ</text>
  

  <!-- Category emoji -->
  <text x="256" y="305" text-anchor="middle" font-size="32"
    font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🌍</text>

  <!-- NFT Name -->
  <text x="256" y="345" text-anchor="middle" font-size="20" font-weight="900"
    font-family="Arial Black, sans-serif" fill="#EC4899"
    filter="url(#shadow)">Africa Explorer #010</text>

  <!-- Category -->
  <text x="256" y="368" text-anchor="middle" font-size="12"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.45)">Géographie Africaine</text>

  <!-- Rarity badge -->
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="#EC4899" opacity="0.15"/>
  <rect x="176" y="380" width="160" height="24" rx="12"
    fill="none" stroke="#EC4899" stroke-width="1" opacity="0.4"/>
  <text x="256" y="397" text-anchor="middle" font-size="11" font-weight="bold"
    font-family="Arial, sans-serif" fill="#EC4899">⬡ UNCOMMON</text>

  <!-- Edition -->
  <text x="256" y="430" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.25)">#010 / 150</text>

  <!-- TriviaQ watermark -->
  <text x="256" y="455" text-anchor="middle" font-size="10"
    font-family="Arial, sans-serif" fill="rgba(255,255,255,0.15)">TriviaQ · Celo Network</text>

  <!-- Decorative stars -->
  <text x="40" y="50" text-anchor="middle" font-size="12" fill="#EC4899" opacity="0.4">✦</text>
<text x="472" y="50" text-anchor="middle" font-size="12" fill="#EC4899" opacity="0.4">✦</text>
<text x="40" y="472" text-anchor="middle" font-size="12" fill="#EC4899" opacity="0.4">✦</text>
<text x="472" y="472" text-anchor="middle" font-size="12" fill="#EC4899" opacity="0.4">✦</text>
<text x="256" y="30" text-anchor="middle" font-size="12" fill="#EC4899" opacity="0.4">✦</text>
</svg>