name: Auto Finish Round

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  finish-round:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: cd contracts && npm install

      - name: Run checkRound script
        run: cd contracts && npx hardhat run scripts/checkRound.ts --network celo
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CELO_RPC: "https://forno.celo.org"
          CELO_SEPOLIA_RPC: "https://alfajores-forno.celo-testnet.org"
          ALFAJORES_RPC: "https://alfajores-forno.celo-testnet.org"